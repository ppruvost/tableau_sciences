<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord Intégré</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .menu {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #f0f8ff;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .menu-item {
            width: 50px;
            height: 50px;
            background-color: #4169e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
        }
        .menu-item:hover {
            background-color: #1e90ff;
        }
        #content-container {
            margin-left: 100px;
            height: 100vh;
            width: calc(100% - 100px);
        }
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="#" onclick="loadInFrame('page1.html')" class="menu-item" title="Dossiers"><i class="fas fa-folder"></i></a>
        <a href="#" onclick="loadInFrame('https://formationenligne.onlyoffice.com/rooms/shared/filter?page=1&sortBy=DateAndTime&sortOrder=descending')" class="menu-item" title="Documents"><i class="fas fa-file-alt"></i></a>
        <a href="#" onclick="loadInFrame('https://ppruvost.github.io/Time-Timer/')" class="menu-item" title="Minuteur"><i class="fas fa-stopwatch"></i></a>
        <a href="#" onclick="loadInFrame('page4.html')" class="menu-item" title="Calendrier"><i class="fas fa-calendar-alt"></i></a>
        <a href="#" onclick="loadInFrame('page5.html')" class="menu-item" title="Graphiques"><i class="fas fa-chart-bar"></i></a>
        <a href="#" onclick="loadInFrame('page6.html')" class="menu-item" title="Utilisateurs"><i class="fas fa-users"></i></a>
        <a href="#" onclick="loadInFrame('page7.html')" class="menu-item" title="Émotions"><i class="fas fa-smile"></i></a>
        <a href="#" onclick="loadInFrame('https://ppruvost.github.io/roue/')" class="menu-item" title="Roue aléatoire"><i class="fas fa-dice"></i></a>
        <a href="#" onclick="loadInFrame('https://ppruvost.github.io/noise/')" class="menu-item" title="Bruitage"><i class="fas fa-volume-up"></i></a>
        <a href="#" onclick="loadInFrame('page10.html')" class="menu-item" title="Sièges"><i class="fas fa-chair"></i></a>
        <a href="#" onclick="loadInFrame('page11.html')" class="menu-item" title="Tableau"><i class="fas fa-clipboard"></i></a>
    </div>

    <div id="content-container">
        <iframe id="content-frame" src="about:blank"></iframe>
    </div>

    <script>
        function loadInFrame(url) {
            event.preventDefault();
            document.getElementById('content-frame').src = url;
        }
    </script>
</body>
</html>
