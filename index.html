<!DOCTYPE html>
<html lang="fr">

<head>
    <!-- Définition de l'encodage des caractères -->
    <meta charset="UTF-8">

    <!-- Permet l'adaptation sur mobile / responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Titre de la page (onglet navigateur) -->
    <title>Tableau de Bord</title>

    <!-- Feuille de style principale -->
    <link rel="stylesheet" href="style.css">

    <!-- Librairie d'icônes Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <!-- ================= MENU PRINCIPAL ================= -->
    <div class="menu">

        <!-- Outil diagrammes (chargé dans un iframe) -->
        <div class="menu-item" data-tooltip="Créer un schéma"
            onclick="loadInFrame('https://app.diagrams.net/')">
            <i class="fas fa-project-diagram"></i>
        </div>

        <!-- Lien externe vers Educ de Normandie -->
        <div class="menu-item" data-tooltip="Educ de Normandie"
            onclick="window.open('https://www.l-educdenormandie.fr/','_blank')">
            <i class="fas fa-school"></i>
        </div>

        <!-- Outil sonore (chargé dans un iframe) -->
        <div class="menu-item" data-tooltip="Son dans la classe"
            onclick="loadInFrame('https://ppruvost.github.io/noise/')">
            <i class="fas fa-volume-up"></i>
        </div>

        <!-- Timer (chargé dans un iframe) -->
        <div class="menu-item" data-tooltip="Timer"
            onclick="loadInFrame('https://ppruvost.github.io/Time-Timer/')">
            <i class="fas fa-stopwatch"></i>
        </div>

        <!-- Application "Classe Puzzle" -->
        <div class="menu-item" data-tooltip="Classe Puzzle"
            onclick="loadURL('https://ppruvost.github.io/roue/')">
            <i class="fas fa-puzzle-piece"></i>
        </div>

        <!-- Lien externe OnlyOffice -->
        <div class="menu-item" data-tooltip="OnlyOffice"
            onclick="window.open('https://www.onlyoffice.com/fr','_blank')">
            <i class="fas fa-users"></i>
        </div>

        <!-- Console Python -->
        <div class="menu-item" data-tooltip="Prog Python"
            onclick="loadURL('https://console.basthon.fr/')">
            <i class="fas fa-code"></i>
        </div>

        <!-- Lien vers Quiz / Notion -->
        <div class="menu-item" data-tooltip="QuizEval"
            onclick="window.open('https://lp-mermoz.notion.site/Maths-Sciences-2ac3d9a0652d8001a27cc98c97fd21cb','_blank')">
            <i class="fas fa-clipboard-list"></i>
        </div>

        <!-- Laboratoire interactif -->
        <div class="menu-item" data-tooltip="Laboratoire"
            onclick="loadURL('https://ppruvost.github.io/laboratory/')">
            <i class="fas fa-flask"></i>
        </div>

        <!-- ===== Sous-menu GeoGebra ===== -->
        <div class="menu-item" data-tooltip="GéoGébra" onclick="toggleMenu('geoMenu', this)">
            <i class="fas fa-shapes"></i>

            <div class="submenu" id="geoMenu">
                <button onclick="loadURL('https://www.geogebra.org/classic?lang=fr')">
                    Classic
                </button>
                <button onclick="loadURL('https://www.geogebra.org/3d?lang=fr')">
                    3D
                </button>
            </div>
        </div>

        <!-- Calculatrice graphique Numworks -->
        <div class="menu-item" data-tooltip="Calculatrice Graphique"
            onclick="loadURL('https://www.numworks.com/fr/emulateur/graphique/')">
            <i class="fas fa-calculator"></i>
        </div>

        <!-- ===== Sous-menu paramètres écran ===== -->
        <div class="menu-item" data-tooltip="Ecran" onclick="toggleMenu('screenMenu', this)">
            <i class="fas fa-cog"></i>

            <div class="submenu" id="screenMenu">
                <button onclick="modeFull()">Écran plein</button>
                <button onclick="modeSplit()">Écran fractionné</button>
            </div>
        </div>

    </div>
    <!-- ================= FIN MENU ================= -->


    <!-- ================= ZONE DE CONTENU ================= -->
    <div id="content-container">

        <!-- Section principale (iframe + image possible) -->
        <div class="content-section" id="section1">
            <iframe id="frame1"></iframe>
            <img id="img1">
        </div>

        <!-- Section secondaire (masquée au départ) -->
        <div class="content-section" id="section2" style="display:none;">
            <iframe id="frame2"></iframe>
        </div>

        <!-- Troisième section (masquée au départ) -->
        <div class="content-section" id="section3" style="display:none;">
            <iframe id="frame3"></iframe>
        </div>

    </div>
    <!-- ================= FIN CONTENU ================= -->


    <!-- Horloge affichée à l'écran -->
    <div id="clock"></div>


    <!-- Script JavaScript principal -->
    <script src="code.js"></script>

</body>
</html>
