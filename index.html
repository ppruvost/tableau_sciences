<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de Bord</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<!-- MENU -->
<div class="menu">

    <div class="menu-item" data-title="QR Code" onclick="loadInFrame('LP MERMOZ - VIRE.png')">
        <i class="fas fa-qrcode"></i>
    </div>

    <div class="menu-item" data-title="Bruit / Son" onclick="loadInFrame('https://ppruvost.github.io/noise/')">
        <i class="fas fa-volume-up"></i>
    </div>

    <div class="menu-item" data-title="Timer" onclick="loadInFrame('https://ppruvost.github.io/Time-Timer/')">
        <i class="fas fa-stopwatch"></i>
    </div>

    <div class="menu-item" data-title="Roue" onclick="loadURL('https://ppruvost.github.io/roue/')">
        <i class="fas fa-dice"></i>
    </div>

    <div class="menu-item" data-title="Salle collaborative"
        onclick="window.open('https://formationenligne.onlyoffice.com/rooms/shared/filter?page=1&sortBy=DateAndTime&sortOrder=descending','_blank')">
        <i class="fas fa-users"></i>
    </div>

    <div class="menu-item" data-title="Basthon (Python)" onclick="loadURL('https://console.basthon.fr/')">
        <i class="fas fa-code"></i>
    </div>

    <div class="menu-item" data-title="Notion"
        onclick="window.open('https://lp-mermoz.notion.site/Maths-Sciences-2ac3d9a0652d8001a27cc98c97fd21cb','_blank')">
        <i class="fas fa-book"></i>
    </div>

    <!-- LABO -->
    <div class="menu-item" data-title="Labo" onclick="loadLabo()">
        <i class="fas fa-flask"></i>
    </div>

    <!-- GEO GEBRA -->
    <div class="menu-item" data-title="GeoGebra" id="geoBtn" onclick="toggleSubmenu()">
        <i class="fas fa-shapes"></i>
    </div>

    <div class="submenu" id="geoMenu">
        <button onclick="loadURL('https://www.geogebra.org/classic?lang=fr')">Classic</button>
        <button onclick="loadURL('https://www.geogebra.org/3d?lang=fr')">3D</button>
    </div>

    <!-- CALCULATRICE -->
    <div class="menu-item" data-title="Calculatrice" onclick="loadURL('https://www.numworks.com/fr/emulateur/graphique/')">
        <i class="fas fa-calculator"></i>
    </div>

    <!-- LAYOUT -->
    <div class="menu-item" data-title="Changer disposition écran" onclick="toggleLayout()">
        <i class="fas fa-cog"></i>
    </div>

</div>

<!-- CONTENU -->
<div id="content-container">

    <!-- COLONNE GAUCHE -->
    <div class="content-section column-left">
        <iframe id="frame1"></iframe>
        <img id="img1">
    </div>

    <!-- COLONNE DROITE -->
    <div class="content-section column-right">
        <div class="right-top">
            <iframe id="frame2"></iframe>
        </div>

        <div class="right-bottom">
            <iframe id="frame3"></iframe>
        </div>

</div>

    </a>
</div>
    
<script src="code.js"></script>

</body>
</html>
