<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Menu principal -->
    <div class="menu">
        <div class="menu-item" data-tooltip="Educ de Normandie" onclick="window.open('https://www.l-educdenormandie.fr/','_blank')">
            <i class="fas fa-school"></i>
        </div>
        <div class="menu-item" data-tooltip="Son dans la classe" onclick="setActiveButton(this); loadInFrame('https://ppruvost.github.io/noise/')">
            <i class="fas fa-volume-up"></i>
        </div>
        <div class="menu-item" data-tooltip="Timer" onclick="setActiveButton(this); loadInFrame('https://ppruvost.github.io/Time-Timer/')">
            <i class="fas fa-stopwatch"></i>
        </div>
        <div class="menu-item" data-tooltip="Classe Puzzle" onclick="setActiveButton(this); loadInFrame('https://ppruvost.github.io/roue/')">
            <i class="fas fa-puzzle-piece"></i>
        </div>
        <div class="menu-item" data-tooltip="OnlyOffice" onclick="window.open('https://www.onlyoffice.com/fr','_blank')">
            <i class="fas fa-users"></i>
        </div>
        <div class="menu-item" data-tooltip="Créer un schéma" onclick="window.open('https://app.diagrams.net/','_blank')">
            <i class="fas fa-project-diagram"></i>
        </div>
        <div class="menu-item" data-tooltip="Prog Python" onclick="setActiveButton(this); loadInFrame('https://console.basthon.fr/')">
            <i class="fas fa-code"></i>
        </div>
        <div class="menu-item" data-tooltip="GéoGébra" onclick="toggleMenu('geoMenu', this)">
            <i class="fas fa-shapes"></i>
            <div class="submenu" id="geoMenu">
                <button onclick="setActiveButton(this); loadInFrame('https://www.geogebra.org/classic?lang=fr')">Classic</button>
                <button onclick="setActiveButton(this); loadInFrame('https://www.geogebra.org/3d?lang=fr')">3D</button>
            </div>
        </div>
        <div class="menu-item" data-tooltip="Calculatrice Graphique" onclick="setActiveButton(this); loadInFrame('https://www.numworks.com/fr/emulateur/graphique/')">
            <i class="fas fa-calculator"></i>
        </div>
        <div class="menu-item" data-tooltip="Laboratoire" onclick="setActiveButton(this); loadInFrame('https://ppruvost.github.io/laboratory/')">
            <i class="fas fa-flask"></i>
        </div>
        <div class="menu-item" data-tooltip="QuizEval" onclick="window.open('https://lp-mermoz.notion.site/Maths-Sciences-2ac3d9a0652d8001a27cc98c97fd21cb','_blank')">
            <i class="fas fa-clipboard-list"></i>
        </div>
        <div class="menu-item" data-tooltip="Ecran" onclick="toggleMenu('screenMenu', this)">
            <i class="fas fa-cog"></i>
            <div class="submenu" id="screenMenu">
                <button onclick="modeFull()">Écran plein</button>
                <button onclick="modeSplit()">Écran fractionné</button>
            </div>
        </div>
    </div>

<!-- Zone de contenu -->
<div id="content-container">
    <!-- Mode plein écran (par défaut) -->
    <div class="fullscreen-mode">
        <iframe id="main-frame"></iframe>
    </div>

    <!-- Mode fractionné (masqué) -->
    <div class="split-mode" style="display: none;">
        <!-- Panneau de gauche -->
        <div class="left-panel">
            <iframe class="panel-frame" id="left-frame"></iframe>
        </div>

        <!-- Panneau de droite -->
        <div class="right-panel">
            <!-- Conteneur pour "noise" (en haut) -->
            <div class="right-panel-top">
                <iframe id="noise-frame" src="https://ppruvost.github.io/noise/"></iframe>
            </div>

            <!-- Conteneur pour "timer" (en bas) -->
            <div class="right-panel-bottom">
                <iframe id="timer-frame" src="https://ppruvost.github.io/Time-Timer/"></iframe>
            </div>
        </div>
    </div>
</div>

    <!-- Horloge -->
    <div id="clock"></div>

    <script src="code.js"></script>
</body>
</html>
