<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de Bord</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial;
    overflow: hidden;
}

/* MENU */
.menu {
    position: fixed;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: #f0f8ff;
    border-radius: 20px;
    padding: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 1000;
}

.menu-item {
    width: 65px;
    height: 65px;
    background: #4169e1;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 26px; /* ICONES PLUS GRANDES */
    cursor: pointer;
    transition: 0.15s;
}

.menu-item:hover {
    background: #1e90ff;
    transform: scale(1.1);
}

/* CONTENU */
#content-container {
    margin-left: 110px;
    height: 100vh;
    display: flex;
}

.content-section {
    flex: 1;
    border: 1px solid #ddd;
    position: relative;
}

iframe, img {
    width: 100%;
    height: 100%;
    border: none;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="menu">

    <!-- QR -->
    <div class="menu-item" onclick="loadContent('qr')" title="QR Code">
        <i class="fas fa-qrcode"></i>
    </div>

    <!-- Noise -->
    <div class="menu-item" onclick="loadContent('noise')" title="Bruitage">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- Timer -->
    <div class="menu-item" onclick="loadContent('timer')" title="Minuteur">
        <i class="fas fa-stopwatch"></i>
    </div>

    <!-- Aléatoire -->
    <div class="menu-item" onclick="loadURL('https://ppruvost.github.io/roue/')" title="Aléatoire">
        <i class="fas fa-dice"></i>
    </div>

    <!-- Mes cours -->
    <div class="menu-item" onclick="loadURL('https://formationenligne.onlyoffice.com/rooms/shared/filter?page=1&sortBy=DateAndTime&sortOrder=descending')" title="Mes cours">
        <i class="fas fa-folder-open"></i>
    </div>

    <!-- Python -->
    <div class="menu-item" onclick="loadURL('https://console.basthon.fr/')" title="Python">
        <i class="fas fa-code"></i>
    </div>

    <!-- QuizEval -->
    <div class="menu-item" onclick="loadURL('https://lp-mermoz.notion.site/Maths-Sciences-2ac3d9a0652d8001a27cc98c97fd21cb')" title="QuizEval">
        <i class="fas fa-flask"></i>
    </div>

    <!-- Labo -->
    <div class="menu-item" onclick="loadURL('https://www.notion.so/lp-mermoz/Laboratoire-2cd3d9a0652d80b9a7beef5d1681016b')" title="Labo">
        <i class="fas fa-users"></i>
    </div>

    <!-- Paramètres -->
    <div class="menu-item" onclick="toggleLayout()" title="Affichage">
        <i class="fas fa-cog"></i>
    </div>

</div>

<!-- CONTENU -->
<div id="content-container">

    <!-- COLONNE 1 -->
    <div class="content-section">
        <iframe id="frame1"></iframe>
        <img id="img1">
    </div>

    <!-- COLONNE 2 -->
    <div class="content-section">
        <iframe id="frame2"></iframe>
    </div>

    <!-- COLONNE 3 -->
    <div class="content-section">
        <iframe id="frame3"></iframe>
    </div>

</div>

<script>
let isSingle = false;

/* CHARGEMENT RAPIDE */
function loadContent(type) {
    if (isSingle) {
        // mode 1 colonne → toujours colonne 1
        applyContent(document.getElementById('frame1'), document.getElementById('img1'), type);
    } else {
        // mode 3 colonnes → remplace colonne 1 uniquement
        applyContent(document.getElementById('frame1'), document.getElementById('img1'), type);
    }
}

function applyContent(frame, img, type) {
    frame.classList.add("hidden");
    img.classList.add("hidden");

    if (type === "qr") {
        img.src = "LP MERMOZ - VIRE.png";
        img.classList.remove("hidden");
    }
    else if (type === "noise") {
        frame.src = "https://ppruvost.github.io/noise/";
        frame.classList.remove("hidden");
    }
    else if (type === "timer") {
        frame.src = "https://ppruvost.github.io/Time-Timer/";
        frame.classList.remove("hidden");
    }
}

/* TOGGLE LAYOUT */
function toggleLayout() {
    const container = document.getElementById("content-container");

    isSingle = !isSingle;

    if (isSingle) {
        // 1 colonne
        container.style.flexDirection = "column";

        document.getElementById("frame2").parentElement.style.display = "none";
        document.getElementById("frame3").parentElement.style.display = "none";
    } else {
        // 3 colonnes
        container.style.flexDirection = "row";

        document.getElementById("frame2").parentElement.style.display = "block";
        document.getElementById("frame3").parentElement.style.display = "block";

        // CONTENU PAR DÉFAUT
        initThreeColumns();
    }
}

/* INIT 3 COLONNES */
function initThreeColumns() {
    // Colonne 1 → QR
    applyContent(
        document.getElementById("frame1"),
        document.getElementById("img1"),
        "qr"
    );

    // Colonne 2 → noise
    document.getElementById("frame2").src = "https://ppruvost.github.io/noise/";

    // Colonne 3 → timer
    document.getElementById("frame3").src = "https://ppruvost.github.io/Time-Timer/";
}

/* INIT */
window.onload = () => {
    initThreeColumns();
};
</script>

</body>
</html>
