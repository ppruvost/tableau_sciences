<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .menu {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #f0f8ff;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .menu-item {
            width: 50px;
            height: 50px;
            background-color: #4169e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        .menu-item:hover {
            background-color: #1e90ff;
        }

        #main {
            margin-left: 100px;
            padding: 20px;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .toolbar {
            display: none;
            outline: none;
        }

        .dialog {
            display: none;
            z-index: 3;
            opacity: 1;
        }

        .nicescroll-rails {
            display: none;
        }

        #content {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="#" onclick="loadContent('page1.html')" class="menu-item"><i class="fas fa-folder"></i></a>
        <a href="#" onclick="loadContent('https://formationenligne.onlyoffice.com/rooms/shared/filter?page=1&sortBy=DateAndTime&sortOrder=descending')" class="menu-item"><i class="fas fa-file-alt"></i></a>
        <a href="#" onclick="loadContent('https://ppruvost.github.io/Time-Timer/')" class="menu-item"><i class="fas fa-stopwatch"></i></a>
        <a href="#" onclick="loadContent('page4.html')" class="menu-item"><i class="fas fa-calendar-alt"></i></a>
        <a href="#" onclick="loadContent('page5.html')" class="menu-item"><i class="fas fa-chart-bar"></i></a>
        <a href="#" onclick="loadContent('page6.html')" class="menu-item"><i class="fas fa-users"></i></a>
        <a href="#" onclick="loadContent('page7.html')" class="menu-item"><i class="fas fa-smile"></i></a>
        <a href="#" onclick="loadContent('https://ppruvost.github.io/roue/')" class="menu-item"><i class="fas fa-dice"></i></a>
        <a href="#" onclick="loadContent('https://ppruvost.github.io/noise/')" class="menu-item"><i class="fas fa-volume-up"></i></a>
        <a href="#" onclick="loadContent('page10.html')" class="menu-item"><i class="fas fa-chair"></i></a>
        <a href="#" onclick="loadContent('page11.html')" class="menu-item"><i class="fas fa-clipboard"></i></a>
    </div>

    <div id="main">
        <div id="content"></div>
    </div>

    <script>
        function loadContent(url) {
            event.preventDefault();
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<iframe src="' + url + '"></iframe>';
        }
    </script>
</body>
</html>
