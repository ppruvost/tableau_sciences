<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minuteur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🕒 Minuteur</h1>
    <label for="minutes">Durée (en minutes, 1 à 120) :</label>
    <input type="number" id="minutes" min="1" max="120" value="25">
    <button id="start">Démarrer</button>
    <canvas id="timerCanvas" width="300" height="300"></canvas>
    <p id="timeText">00:00</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
